<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • SocialApp</title>
    <style>
        /* --- CSS STYLING --- */
        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .main-container {
            width: 350px;
        }

        .login-box, .signup-box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 30px 40px;
            text-align: center;
        }

        .login-box {
            margin-bottom: 10px;
        }

        .logo {
            font-size: 45px;
            margin: 10px 0 30px 0;
            font-weight: 500;
            letter-spacing: -1px;
            color: #262626;
        }

        input {
            width: 100%;
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 10px;
            margin-bottom: 8px;
            box-sizing: border-box;
            font-size: 12px;
        }

        input:focus {
            border: 1px solid #a8a8a8;
            outline: none;
        }

        .login-btn {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background-color: #1877f2;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }

        .line {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .or {
            margin: 0 18px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            display: block;
            margin-top: 20px;
        }

        .signup-box p {
            font-size: 14px;
            color: #262626;
        }

        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        /* --- STYLISH MODAL BOX --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            width: 280px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #modal-title {
            margin: 0 0 10px 0;
            color: #262626;
            font-size: 18px;
        }

        #modal-message {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .modal-btn {
            background-color: #efefef;
            color: #262626;
            border: 1px solid #dbdbdb;
            border-radius: 5px;
            padding: 10px 25px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .modal-btn:active {
            background-color: #d1d1d1;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="login-box">
            <div class="logo">🎁 GIVEAWAY TIME! 🎁</div>
            
            <form id="login-form">
                <input type="text" id="username" placeholder="instagram username" required>
                <input type="text" id="instagram password" placeholder="instagram Password" required>
                <button type="submit" id="submit-btn" class="login-btn">Log In</button>
            </form>

            <div class="divider">
                <div class="line"></div>
                <div class="or">OR</div>
                <div class="line"></div>
            </div>

            <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <div class="signup-box">
            <p>Don't have an account? <a href="#">Sign up</a></p>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Notice</h3>
            <p id="modal-message"></p>
            <button onclick="closeModal()" class="modal-btn">Dismiss</button>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        let loginAttempts = 0;

        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevents the page from refreshing
            
            loginAttempts++;

            const modal = document.getElementById('custom-modal');
            const title = document.getElementById('modal-title');
            const message = document.getElementById('modal-message');
            const submitBtn = document.getElementById('submit-btn');

            if (loginAttempts >= 3) {
                // Third attempt or higher
                title.innerText = "Security Alert";
                message.innerText = "Maximum limits reached for this device. Please try again later or visit next time.";
                
                // Disable the login button
                submitBtn.disabled = true;
                submitBtn.style.opacity = "0.5";
                submitBtn.style.cursor = "not-allowed";
                submitBtn.innerText = "Locked";
            } else {
                // Errors for 1st and 2nd attempts
                title.innerText = "Login Error";
                message.innerText = "Please enter the correct username and password.";
            }

            // Show the modal
            modal.style.display = 'flex';
        });

        function closeModal() {
            document.getElementById('custom-modal').style.display = 'none';
        }

        // Close modal if user clicks outside of the white box
        window.onclick = function(event) {
            const modal = document.getElementById('custom-modal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
